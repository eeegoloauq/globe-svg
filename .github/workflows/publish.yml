# Publishes to npm on tag push (v*) via OIDC trusted publishing — no token
# secrets. Requires the Trusted Publisher config on npmjs.com (package
# Settings): repo eeegoloauq/globe-svg, workflow publish.yml. Provenance is
# implied by trusted publishing.
name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm --provenance

jobs:
  publish:
    # Forgejo runs .github workflows too — publish only from the GitHub mirror
    if: github.repository_owner == 'eeegoloauq'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install -g npm@latest # OIDC needs npm >= 11.5
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
